<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Restaurante | Vibras Zuass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white p-4 pb-20">
    <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
        <h1 class="text-2xl font-black text-orange-500 italic">ZUASS! <span class="text-white underline">COCINA</span></h1>
        <div class="bg-red-600 px-3 py-1 rounded-full text-xs font-bold animate-pulse">RECIBIENDO...</div>
    </header>
    
    <div id="contenedor-pedidos" class="grid gap-4">
        <p class="text-center text-slate-500 py-20 italic">Esperando hambre de la tierrita... 🍳</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBa3WgBBS0ES3HCMHXebTDNPprGZmePi70",
            authDomain: "vibraszuass.firebaseapp.com",
            projectId: "vibraszuass",
            storageBucket: "vibraszuass.firebasestorage.app",
            messagingSenderId: "441433261428",
            appId: "1:441433261428:web:f418c47d4352cb28a59821",
            databaseURL: "https://vibraszuass-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ESCUCHAR TODOS LOS PEDIDOS "PENDIENTES"
        onValue(ref(db, 'pedidos'), (snapshot) => {
            const pedidos = snapshot.val();
            const lista = document.getElementById('contenedor-pedidos');
            lista.innerHTML = "";
            
            let hayPendientes = false;

            for(let id in pedidos) {
                const p = pedidos[id];
                if(p.estado === "pendiente") {
                    hayPendientes = true;
                    // Listar los productos del pedido
                    let itemsHtml = p.items.map(i => `<li class="text-sm">• ${i.nombre}</li>`).join('');

                    lista.innerHTML += `
                        <div class="bg-slate-800 p-6 rounded-3xl border-l-8 border-orange-500 shadow-xl">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="font-black text-xl text-white uppercase">${p.cliente}</h3>
                                    <p class="text-[10px] text-slate-400 font-bold tracking-widest">${p.fecha}</p>
                                </div>
                                <span class="bg-orange-500/20 text-orange-500 px-3 py-1 rounded-lg font-black">$${p.total}</span>
                            </div>
                            
                            <ul class="mb-6 space-y-1 text-slate-300">
                                ${itemsHtml}
                            </ul>

                            <button onclick="window.aceptarPedido('${id}')" 
                                class="w-full bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-2xl shadow-lg transition-all active:scale-95">
                                <i class="fas fa-check-circle mr-2"></i> ACEPTAR Y EMPEZAR
                            </button>
                        </div>
                    `;
                }
            }

            if(!hayPendientes) {
                lista.innerHTML = `<div class="text-center py-20 opacity-20"><i class="fas fa-utensils text-6xl mb-4"></i><p>Sin pedidos por ahora.</p></div>`;
            }
        });

        // FUNCIÓN PARA ACEPTAR PEDIDO
        window.aceptarPedido = (id) => {
            update(ref(db, `pedidos/${id}`), { 
                estado: "preparando" 
            }).then(() => {
                console.log("Pedido aceptado. Ahora le aparecerá al domiciliario.");
            });
        };
    </script>

    <footer class="mt-10 text-center text-[10px] text-slate-600 p-4">
        App desarrollada por Vibras Positivas derechos de autor (3117700431)
    </footer>
</body>
</html>
