<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Vibras Zuass!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 p-4 pb-20">

    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black text-orange-600 italic leading-none">PANEL MAESTRO</h1>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Vibras Zuass! Caucasia</p>
        </div>
        <div class="bg-orange-500 text-white h-12 w-12 rounded-2xl flex items-center justify-center shadow-lg shadow-orange-200">
            <i class="fas fa-user-shield text-xl"></i>
        </div>
    </header>

    <section class="bg-white p-6 rounded-[2.5rem] shadow-xl mb-8 border-t-8 border-orange-500">
        <h2 class="text-lg font-black mb-6 flex items-center gap-2 text-gray-800">
            <i class="fas fa-plus-circle text-orange-500"></i> AGREGAR NUEVO PLATO
        </h2>
        
        <div class="grid gap-4">
            <input id="prod-nombre" type="text" placeholder="Nombre del plato (ej: Picada)" class="p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all shadow-inner text-gray-700">
            <input id="prod-precio" type="number" placeholder="Precio (solo números)" class="p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all shadow-inner text-gray-700">
            <input id="prod-desc" type="text" placeholder="Descripción breve" class="p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all shadow-inner text-gray-700">
            
            <div class="flex gap-2">
                <select id="prod-restaurante" class="flex-1 p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 shadow-inner text-gray-700 font-bold">
                    <option>Cargando restaurantes...</option>
                </select>
                <button onclick="window.agregarNuevoRestaurante()" class="bg-orange-100 p-4 rounded-2xl text-orange-600 hover:bg-orange-500 hover:text-white transition-all shadow-sm">
                    <i class="fas fa-store text-xl"></i>
                </button>
            </div>

            <button onclick="window.guardarProducto()" class="bg-orange-600 hover:bg-orange-500 text-white font-black py-5 rounded-2xl shadow-lg shadow-orange-200 active:scale-95 transition-all text-lg mt-2">
                GUARDAR EN LA APP ✅
            </button>
        </div>
    </section>

    <section class="bg-white p-6 rounded-[2.5rem] shadow-xl">
        <h2 class="text-lg font-black mb-6 flex items-center gap-2 text-gray-800">
            <i class="fas fa-utensils text-orange-500"></i> PLATOS ACTIVOS
        </h2>
        <div id="lista-admin" class="grid gap-3 text-sm">
            <p class="text-center text-gray-300 py-10 italic">Sincronizando con la nube...</p>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBa3WgBBS0ES3HCMHXebTDNPprGZmePi70",
            authDomain: "vibraszuass.firebaseapp.com",
            projectId: "vibraszuass",
            storageBucket: "vibraszuass.firebasestorage.app",
            messagingSenderId: "441433261428",
            appId: "1:441433261428:web:f418c47d4352cb28a59821",
            databaseURL: "https://vibraszuass-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GESTIÓN DE RESTAURANTES ---
        window.agregarNuevoRestaurante = function() {
            const nuevoRest = prompt("Escribe el nombre del nuevo restaurante de Caucasia:");
            if (nuevoRest && nuevoRest.trim() !== "") {
                const restRef = ref(db, 'config/restaurantes');
                push(restRef, nuevoRest.trim()).then(() => {
                    alert("¡Zuass! '" + nuevoRest + "' ahora está en la lista.");
                });
            }
        };

        onValue(ref(db, 'config/restaurantes'), (snapshot) => {
            const select = document.getElementById('prod-restaurante');
            select.innerHTML = "";
            const data = snapshot.val();
            
            if (!data) {
                let opt = document.createElement('option');
                opt.text = "Restaurante Central";
                select.add(opt);
                return;
            }

            for (let id in data) {
                let option = document.createElement('option');
                option.value = data[id];
                option.text = data[id];
                select.add(option);
            }
        });

        // --- GESTIÓN DE PRODUCTOS ---
        window.guardarProducto = function() {
            const nombre = document.getElementById('prod-nombre').value;
            const precio = document.getElementById('prod-precio').value;
            const desc = document.getElementById('prod-desc').value;
            const rest = document.getElementById('prod-restaurante').value;

            if(nombre && precio) {
                const prodRef = ref(db, 'productos');
                const nuevoProdRef = push(prodRef);
                set(nuevoProdRef, { nombre, precio, desc, rest })
                .then(() => {
                    document.getElementById('prod-nombre').value = "";
                    document.getElementById('prod-precio').value = "";
                    document.getElementById('prod-desc').value = "";
                });
            } else {
                alert("Pon al menos el nombre y el precio, Harold.");
            }
        };

        onValue(ref(db, 'productos'), (snapshot) => {
            const data = snapshot.val();
            const listado = document.getElementById('lista-admin');
            listado.innerHTML = "";
            
            if (!data) {
                listado.innerHTML = "<p class='text-center text-gray-400 py-6 italic'>No hay platos en el menú.</p>";
                return;
            }

            for(let id in data) {
                listado.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-gray-50 rounded-3xl border border-gray-100">
                        <div>
                            <p class="font-black text-gray-800 uppercase text-[11px] tracking-tighter">${data[id].nombre}</p>
                            <p class="text-orange-600 font-black text-lg">$${data[id].precio}</p>
                            <p class="text-[9px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full inline-block font-bold mt-1">${data[id].rest}</p>
                        </div>
                        <button onclick="window.borrar('${id}')" class="bg-red-100 text-red-500 h-10 w-10 rounded-2xl flex items-center justify-center active:scale-90 transition-all">
                            <i class="fas fa-trash-alt text-sm"></i>
                        </button>
                    </div>
                `;
            }
        });

        window.borrar = (id) => {
            if(confirm("¿Seguro que quieres eliminar este plato de la app?")) {
                remove(ref(db, `productos/${id}`));
            }
        };
    </script>

    <footer class="mt-12 text-center">
        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-[0.3em]">
            App desarrollada por Vibras Positivas derechos de autor (3117700431)
        </p>
    </footer>
</body>
</html>
