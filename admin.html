<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Maestro | Vibras Zuass!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 p-4 pb-20 text-gray-800">

    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black text-orange-600 italic leading-none">VIBRAS ZUASS!</h1>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Panel de Control Comercial</p>
        </div>
        <div class="bg-orange-500 text-white h-12 w-12 rounded-2xl flex items-center justify-center shadow-lg">
            <i class="fas fa-crown"></i>
        </div>
    </header>

    <section class="bg-slate-900 p-6 rounded-[2.5rem] shadow-xl mb-8 border-t-8 border-blue-500 text-white">
        <h2 class="text-lg font-black mb-6 flex items-center gap-2">
            <i class="fas fa-motorcycle text-blue-400"></i> REGISTRO DE REPARTIDORES
        </h2>
        <div class="grid gap-3">
            <input id="rep-nombre" type="text" placeholder="Nombre del Repartidor" class="p-4 bg-slate-800 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 shadow-inner text-white">
            <input id="rep-placa" type="text" placeholder="Número de Placa (ej: XYZ-123)" class="p-4 bg-slate-800 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 shadow-inner text-white uppercase">
            <button onclick="registrarRepartidor()" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all">
                VINCULAR REPARTIDOR ➕
            </button>
        </div>

        <div id="lista-repartidores" class="mt-6 grid gap-2">
            </div>
    </section>

    <section class="bg-white p-6 rounded-[2.5rem] shadow-xl mb-8 border-t-8 border-orange-500">
        <h2 class="text-lg font-black mb-4 flex items-center gap-2">
            <i class="fas fa-hamburger text-orange-500"></i> AGREGAR PLATO
        </h2>
        <div class="grid gap-3">
            <input id="prod-nombre" type="text" placeholder="Nombre del plato" class="p-4 bg-gray-50 rounded-2xl outline-none border border-gray-100">
            <input id="prod-precio" type="number" placeholder="Precio" class="p-4 bg-gray-50 rounded-2xl outline-none border border-gray-100">
            <div class="flex gap-2">
                <select id="prod-restaurante" class="flex-1 p-4 bg-gray-50 rounded-2xl border border-gray-100 font-bold"></select>
                <button onclick="agregarNuevoRestaurante()" class="bg-orange-100 p-4 rounded-2xl text-orange-600"><i class="fas fa-store"></i></button>
            </div>
            <button onclick="guardarProducto()" class="bg-orange-600 text-white font-black py-4 rounded-2xl shadow-lg">GUARDAR PLATO ✅</button>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBa3WgBBS0ES3HCMHXebTDNPprGZmePi70",
            authDomain: "vibraszuass.firebaseapp.com",
            projectId: "vibraszuass",
            storageBucket: "vibraszuass.firebasestorage.app",
            messagingSenderId: "441433261428",
            appId: "1:441433261428:web:f418c47d4352cb28a59821",
            databaseURL: "https://vibraszuass-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- LÓGICA DE REPARTIDORES ---
        window.registrarRepartidor = function() {
            const nombre = document.getElementById('rep-nombre').value;
            const placa = document.getElementById('rep-placa').value;
            if(nombre && placa) {
                const repRef = ref(db, 'config/repartidores');
                push(repRef, { nombre, placa }).then(() => {
                    document.getElementById('rep-nombre').value = "";
                    document.getElementById('rep-placa').value = "";
                    alert("¡Repartidor registrado en la red!");
                });
            }
        };

        onValue(ref(db, 'config/repartidores'), (snapshot) => {
            const listado = document.getElementById('lista-repartidores');
            listado.innerHTML = "";
            const data = snapshot.val();
            for(let id in data) {
                listado.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-800 p-3 rounded-xl border border-slate-700">
                        <div class="text-sm">
                            <p class="font-bold text-blue-400">${data[id].nombre}</p>
                            <p class="text-[10px] opacity-60">Placa: ${data[id].placa}</p>
                        </div>
                        <button onclick="borrarRep('${id}')" class="text-red-400 px-2"><i class="fas fa-times"></i></button>
                    </div>`;
            }
        });

        window.borrarRep = (id) => remove(ref(db, `config/repartidores/${id}`));

        // --- (Aquí sigue tu lógica de restaurantes y productos que ya teníamos) ---
        window.agregarNuevoRestaurante = function() {
            const nuevoRest = prompt("Nombre del restaurante:");
            if (nuevoRest) push(ref(db, 'config/restaurantes'), nuevoRest);
        };

        onValue(ref(db, 'config/restaurantes'), (snapshot) => {
            const select = document.getElementById('prod-restaurante');
            select.innerHTML = "";
            const data = snapshot.val();
            for (let id in data) {
                let opt = document.createElement('option');
                opt.value = data[id]; opt.text = data[id];
                select.add(opt);
            }
        });

        window.guardarProducto = function() {
            const nombre = document.getElementById('prod-nombre').value;
            const precio = document.getElementById('prod-precio').value;
            const rest = document.getElementById('prod-restaurante').value;
            if(nombre && precio) {
                push(ref(db, 'productos'), { nombre, precio, rest }).then(() => {
                    document.getElementById('prod-nombre').value = "";
                    document.getElementById('prod-precio').value = "";
                });
            }
        };
    </script>

    <footer class="mt-10 text-center text-[9px] text-gray-400 font-bold uppercase tracking-widest">
        App desarrollada por Vibras Positivas derechos de autor (3117700431)
    </footer>
</body>
</html>
