<div class="bg-gray-800 p-5 rounded-3xl border-2 border-orange-500 shadow-2xl">
    <div class="flex justify-between items-center mb-4">
        <span class="text-orange-500 font-black text-xl italic underline">NUEVO ENVÍO</span>
        <span class="text-xs text-gray-400 font-mono">${p.fecha}</span>
    </div>
    <h3 class="text-white text-2xl font-bold mb-1">${p.cliente}</h3>
    <p class="text-green-400 font-bold mb-4">COBRAR: $${p.total}</p>
    
    <div class="grid grid-cols-2 gap-3">
        <a href="https://www.google.com/maps?q=${p.coords.lat},${p.coords.lng}" target="_blank" 
           class="bg-blue-600 text-white py-4 rounded-2xl font-bold flex flex-col items-center justify-center text-xs">
            <i class="fas fa-map-marked-alt text-xl mb-1"></i> VER RUTA
        </a>
        <button onclick="window.cambiarEstadoPedido('${id}', 'entregado')" 
                class="bg-green-600 text-white py-4 rounded-2xl font-bold text-xs">
            FINALIZAR ✅
        </button>
    </div>
</div>
