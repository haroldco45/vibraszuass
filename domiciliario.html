<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuass! Reparto | Panel Domiciliarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .bloqueo-reparto {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 30px;
        }
    </style>
</head>
<body class="text-slate-200 pb-24">

    <div id="bloqueo-repartidor" class="bloqueo-reparto hidden">
        <div class="bg-slate-800 p-8 rounded-[3rem] border-b-8 border-red-500 shadow-2xl">
            <i class="fas fa-hand-holding-dollar text-red-500 text-6xl mb-6"></i>
            <h1 class="text-white font-black text-3xl mb-2 italic">CUPO INACTIVO</h1>
            <p class="text-slate-400 mb-8 font-bold text-sm leading-relaxed uppercase tracking-widest">
                Tu acceso al sistema de repartos está suspendido.<br>Contacta a la central Zuass!
            </p>
            <a href="https://wa.me/573117700431" class="bg-green-600 block w-full py-5 rounded-2xl font-black text-lg shadow-lg">
                PAGAR MI CUPO AQUÍ
            </a>
        </div>
    </div>

    <header class="p-5 bg-orange-600 shadow-2xl flex justify-between items-center sticky top-0 z-50">
        <div>
            <h1 class="font-black text-xl italic tracking-tighter text-white">
                <i class="fas fa-motorcycle mr-2"></i>ZUASS! REPARTO
            </h1>
            <p id="info-repartidor" class="text-[9px] text-orange-200 font-bold uppercase tracking-widest mt-0.5 italic">Verificando Placa...</p>
        </div>
        <div class="bg-black/20 px-3 py-1 rounded-full text-[10px] font-black" id="status-chip">...</div>
    </header>

    <main class="p-4">
        <div class="flex items-center gap-2 mb-6">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
            </span>
            <h2 class="text-slate-400 font-bold text-xs uppercase tracking-widest italic">Rutas listas para Caucasia:</h2>
        </div>
        
        <div id="lista-reparto" class="grid gap-6">
            <div class="text-center py-20 opacity-20">
                <i class="fas fa-circle-notch fa-spin text-4xl mb-4"></i>
                <p>Zuass... esperando despacho de cocina...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBa3WgBBS0ES3HCMHXebTDNPprGZmePi70",
            authDomain: "vibraszuass.firebaseapp.com",
            projectId: "vibraszuass",
            storageBucket: "vibraszuass.firebasestorage.app",
            messagingSenderId: "441433261428",
            appId: "1:441433261428:web:f418c47d4352cb28a59821",
            databaseURL: "https://vibraszuass-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- VALIDACIÓN INVISIBLE DE REPARTIDOR ---
        const urlParams = new URLSearchParams(window.location.search);
        const idRepartidor = urlParams.get('id'); // Cada domiciliario tiene su link: domiciliario.html?id=ID_REPARTIDOR

        onValue(ref(db, `config/repartidores/${idRepartidor}`), (snapshot) => {
            const rep = snapshot.val();
            const bloqueo = document.getElementById('bloqueo-repartidor');
            const info = document.getElementById('info-repartidor');
            const chip = document.getElementById('status-chip');

            if (!rep || rep.estado !== 'activo') {
                bloqueo.classList.remove('hidden'); // CIERRE TOTAL
                chip.innerText = "BLOQUEADO";
            } else {
                bloqueo.classList.add('hidden'); // ACCESO TOTAL
                info.innerText = `${rep.nombre} | PLACA: ${rep.placa}`;
                chip.innerText = "ACTIVO";
                chip.classList.add('text-green-400');
            }
        });

        // --- CARGAR PEDIDOS DISPONIBLES (SOLO ESTADO 'PREPARANDO') ---
        onValue(ref(db, 'pedidos'), (snapshot) => {
            const pedidos = snapshot.val();
            const contenedor = document.getElementById('lista-reparto');
            contenedor.innerHTML = "";
            let hayPedidos = false;

            if (!pedidos) { mostrarVacio(contenedor); return; }

            for (let id in pedidos) {
                const p = pedidos[id];
                if (p.estado === "preparando" || p.estado === "listo") {
                    hayPedidos = true;
                    const itemsLista = p.items.map(i => `• ${i.cantidad}x ${i.nombre}`).join("<br>");

                    contenedor.innerHTML += `
                        <div class="bg-slate-800 rounded-[2.5rem] p-6 border-l-4 border-blue-500 shadow-2xl relative overflow-hidden">
                            <div class="absolute top-0 right-0 bg-blue-600 text-white font-black text-[9px] px-4 py-1.5 rounded-bl-2xl">DOMICILIO</div>
                            
                            <h3 class="text-2xl font-black text-orange-500 mb-1 uppercase tracking-tighter">${p.cliente}</h3>
                            <p class="text-[10px] text-slate-500 font-bold mb-4 italic italic">${p.fecha}</p>
                            
                            <div class="bg-slate-900/50 p-4 rounded-2xl mb-5 border border-slate-700/30">
                                <p class="text-[9px] text-slate-500 uppercase font-black mb-1">Items en maleta:</p>
                                <p class="text-xs text-slate-300 font-bold leading-relaxed">${itemsLista}</p>
                            </div>

                            <div class="flex items-center justify-between mb-6 px-2">
                                <span class="text-xs font-bold text-slate-500 uppercase">Cobrar:</span>
                                <span class="text-3xl font-black text-white leading-none">$${p.total}</span>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="window.abrirRuta(${p.coords?.lat}, ${p.coords?.lng})" 
                                        class="bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl flex flex-col items-center justify-center gap-1 transition-all active:scale-95 shadow-lg shadow-blue-900/20">
                                    <i class="fas fa-location-arrow text-xl"></i>
                                    <span class="text-[8px] uppercase tracking-widest">VER GPS</span>
                                </button>
                                
                                <button onclick="window.finalizarEntrega('${id}')" 
                                        class="bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-2xl flex flex-col items-center justify-center gap-1 transition-all active:scale-95 shadow-lg shadow-green-900/20">
                                    <i class="fas fa-check-circle text-xl"></i>
                                    <span class="text-[8px] uppercase tracking-widest">ENTREGADO</span>
                                </button>
                            </div>
                        </div>
                    `;
                }
            }
            if (!hayPedidos) mostrarVacio(contenedor);
        });

        function mostrarVacio(div) {
            div.innerHTML = `<div class="text-center py-20 opacity-20"><i class="fas fa-motorcycle text-6xl mb-4"></i><p>Todo entregado. ¡Zuass!</p></div>`;
        }

        window.abrirRuta = (lat, lng) => {
            if(!lat || !lng) return alert("¡Uy! El cliente no mandó ubicación. Llama a la cocina.");
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank');
        };

        window.finalizarEntrega = (id) => {
            if(confirm("¿Recibiste el dinero y entregaste el pedido?")) {
                update(ref(db, `pedidos/${id}`), { estado: "entregado" });
            }
        };
    </script>

    <footer class="mt-20 text-center p-6 border-t border-slate-800">
        <p class="text-[8px] text-slate-600 font-black uppercase tracking-[0.4em] mb-2 italic">
            App desarrollada por Vibras Positivas (3117700431)
        </p>
    </footer>
</body>
</html>
