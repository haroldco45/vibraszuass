<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibras Zuass! | Cliente</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <header class="p-4 bg-white shadow-sm flex justify-between items-center">
        <h1 class="text-orange-500 font-bold text-xl">Vibras Zuass!</h1>
        <span id="contador" class="bg-orange-500 text-white px-2 rounded-full">0</span>
    </header>

    <div class="p-4">
        <div class="bg-white p-4 rounded-xl shadow mb-4">
            <h3 class="font-bold">Salchipapa Especial</h3>
            <p class="text-gray-500 text-sm">Con todo el sabor de la tierrita.</p>
            <button onclick="agregar(15000, 'Salchipapa Especial')" class="mt-2 bg-orange-500 text-white px-4 py-2 rounded-lg w-full">Agregar $15.000</button>
        </div>
    </div>

    <div id="btn-pedir" class="fixed bottom-0 w-full p-4 bg-white hidden">
        <button onclick="mandarAFirebase()" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold">Pedir Zuass!</button>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        let carrito = [];
        let total = 0;
        function agregar(precio, nombre) {
            carrito.push({nombre, precio});
            total += precio;
            document.getElementById('contador').innerText = carrito.length;
            document.getElementById('btn-pedir').classList.remove('hidden');
        }
        function mandarAFirebase() {
            window.enviarPedidoZuass(carrito, total);
        }
    </script>
    <footer class="mt-10 text-center text-xs text-gray-400 p-4">
        App desarrollada por Vibras Positivas derechos de autor (3117700431)
    </footer>
</body>
</html>
